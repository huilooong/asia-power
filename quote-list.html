<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Quote List | AsiaPower</title>
  <link rel="stylesheet" href="css/styles.css?v=mnav-drawer-v1">
  <link rel="stylesheet" href="css/ebay-layout.css?v=site-consistency-v1" data-ebay-layout="1">
  <link rel="stylesheet" href="css/quote-list.css?v=quote-list-v1">
  <link rel="icon" href="assets/favicon.png" type="image/png">
</head>
<body data-page="quote-list">
  <div id="site-topbar"></div>
  <div id="site-header"></div>
  <main id="main-content" class="quote-list-page">
    <h1>Quote list</h1>
    <p class="lead">Add units from product pages, then send one WhatsApp inquiry for the whole list. This is not checkout — our team confirms price and shipping.</p>
    <div id="quote-list-root"></div>
    <div class="quote-list-actions" id="quote-list-actions" hidden>
      <a class="btn btn-wa" id="quote-wa" href="#" target="_blank" rel="noopener">WhatsApp this list</a>
      <button type="button" class="btn btn-clear" id="quote-clear">Clear list</button>
    </div>
  </main>
  <div id="site-footer"></div>
  <div id="site-whatsapp"></div>
  <script src="js/path-utils.js?v=site-i18n-cache-fix-v1"></script>
  <script src="js/config.js?v=seo-guides-20260716"></script>
  <script src="js/whatsapp-crm.js?v=quote-list-v1"></script>
  <script src="js/quote-list.js?v=quote-list-v1"></script>
  <script src="js/components.js?v=mnav-drawer-v3" defer></script>
  <script src="js/main.js?v=wa-lead-v1" defer></script>
  <script>
    (function () {
      const root = document.getElementById('quote-list-root');
      const actions = document.getElementById('quote-list-actions');
      const wa = document.getElementById('quote-wa');
      const clearBtn = document.getElementById('quote-clear');

      function money(n) {
        if (n == null || !Number.isFinite(Number(n))) return '—';
        return '$' + Math.round(Number(n)).toLocaleString('en-US');
      }

      function render() {
        const items = window.QuoteList.read();
        window.QuoteList.refreshBadges();
        if (!items.length) {
          root.innerHTML = '<div class="quote-list-empty">Your quote list is empty. Open a product page and tap <strong>Add to quote list</strong>.</div>';
          actions.hidden = true;
          return;
        }
        actions.hidden = false;
        wa.href = window.QuoteList.bulkWhatsAppUrl(items);
        root.innerHTML = `<table class="quote-list-table">
          <thead><tr><th>#</th><th>Unit</th><th>Qty</th><th>EXW</th><th></th></tr></thead>
          <tbody>
            ${items.map((it, i) => `<tr>
              <td>${i + 1}</td>
              <td>
                <strong>${it.stockId}</strong>
                ${it.partLabel || it.partType ? ` · ${it.partLabel || it.partType}` : ''}<br>
                ${[it.year, it.brand, it.model].filter(Boolean).join(' ')}
                ${it.engineCode ? ` · ${it.engineCode}` : ''}
                ${it.pageUrl ? `<br><a href="${it.pageUrl}">View listing</a>` : ''}
              </td>
              <td>${it.qty || 1}</td>
              <td>${money(it.priceUsd)}${it.priceNote ? `<span class="quote-list-price-note">${it.priceNote}</span>` : ''}</td>
              <td><button type="button" data-remove-stock="${it.stockId}" data-remove-part="${it.partType || ''}">Remove</button></td>
            </tr>`).join('')}
          </tbody>
        </table>`;
        root.querySelectorAll('[data-remove-stock]').forEach((btn) => {
          btn.addEventListener('click', () => {
            window.QuoteList.remove(btn.getAttribute('data-remove-stock'), btn.getAttribute('data-remove-part') || '');
            render();
          });
        });
      }

      clearBtn.addEventListener('click', () => {
        window.QuoteList.clear();
        render();
      });
      window.addEventListener(window.QuoteList.CHANGE_EVENT, render);
      document.addEventListener('DOMContentLoaded', render);
      render();
    })();
  </script>
</body>
</html>
