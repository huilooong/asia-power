<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" role="img" aria-label="AsiaPower Parts  Photos on request">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8eef5"/>
      <stop offset="45%" stop-color="#f3f5f8"/>
      <stop offset="100%" stop-color="#dde5ee"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#f0f3f7" stop-opacity="0.88"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#0a1628" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#grid)"/>

  <!-- soft atmosphere -->
  <circle cx="120" cy="90" r="160" fill="#ffffff" fill-opacity="0.45"/>
  <circle cx="700" cy="520" r="180" fill="#0a1628" fill-opacity="0.04"/>

  <!-- card -->
  <rect x="140" y="110" width="520" height="380" rx="28" fill="url(#panel)" stroke="#d5dde8" stroke-width="1.5"/>
  <rect x="140" y="110" width="520" height="8" rx="4" fill="url(#accent)"/>

  <!-- mechanical glyph -->
  <g transform="translate(400 270)" fill="none" stroke="#0a1628" stroke-opacity="0.55" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="0" cy="0" r="54"/>
    <circle cx="0" cy="0" r="22"/>
    <path d="M0 -54v-18M0 54v18M-54 0h-18M54 0h18"/>
    <path d="M-38 -38l-14 -14M38 -38l14 -14M-38 38l-14 14M38 38l14 14"/>
    <path d="M-16 -48c-18 6-30 22-30 42s12 36 30 42"/>
    <path d="M16 -48c18 6 30 22 30 42s-12 36-30 42"/>
  </g>

  <text x="400" y="372" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="28" font-weight="700" fill="#0a1628" letter-spacing="0.04em">AsiaPower Parts</text>
  <text x="400" y="408" text-anchor="middle" font-family="Helvetica Neue, Arial, sans-serif" font-size="16" font-weight="500" fill="#5b6775" letter-spacing="0.08em">PHOTOS ON REQUEST</text>
</svg>
