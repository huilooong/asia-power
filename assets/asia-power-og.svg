<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f5f7"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4880a"/>
      <stop offset="100%" stop-color="#f5a623"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid texture -->
  <rect width="1200" height="630" fill="none" stroke="#e8e8ed" stroke-width="1" opacity="0.4"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>

  <!-- Top border line -->
  <rect x="0" y="0" width="1200" height="1" fill="#d2d2d7"/>
  <!-- Bottom border line -->
  <rect x="0" y="629" width="1200" height="1" fill="#d2d2d7"/>

  <!-- Logo mark — AP monogram -->
  <g transform="translate(80, 200)">
    <rect width="72" height="72" rx="18" fill="#1d1d1f"/>
    <text x="36" y="52" font-family="-apple-system, Helvetica Neue, Arial" font-size="32" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="-1">AP</text>
  </g>

  <!-- AsiaPower wordmark -->
  <text x="174" y="249" font-family="-apple-system, Helvetica Neue, Arial" font-size="30" font-weight="700" fill="#1d1d1f" letter-spacing="-0.5">Asia<tspan fill="#d4880a">Power</tspan></text>

  <!-- Divider -->
  <rect x="80" y="310" width="520" height="1.5" fill="#e8e8ed"/>

  <!-- Main headline -->
  <text x="80" y="390" font-family="-apple-system, Helvetica Neue, Arial" font-size="56" font-weight="700" fill="#1d1d1f" letter-spacing="-2">Global Powertrain</text>
  <text x="80" y="460" font-family="-apple-system, Helvetica Neue, Arial" font-size="56" font-weight="700" fill="#1d1d1f" letter-spacing="-2">Sourcing Platform</text>

  <!-- Sub copy -->
  <text x="80" y="530" font-family="-apple-system, Helvetica Neue, Arial" font-size="22" fill="#6e6e73" letter-spacing="0">Engines · Gearboxes · Half-Cuts · Trucks — EXW &amp; CIF Worldwide</text>

  <!-- Domain -->
  <text x="80" y="590" font-family="-apple-system, Helvetica Neue, Arial" font-size="16" fill="#86868b" letter-spacing="0.02em">asia-power.com</text>

  <!-- Right side — decorative product cards -->
  <g transform="translate(750, 120)">
    <!-- Card 1 -->
    <rect width="380" height="180" rx="16" fill="#ffffff" stroke="#e8e8ed" stroke-width="1.5"/>
    <rect x="16" y="16" width="116" height="80" rx="10" fill="#f5f5f7"/>
    <!-- shimmer lines -->
    <rect x="148" y="24" width="160" height="12" rx="4" fill="#f0f0f0"/>
    <rect x="148" y="44" width="120" height="10" rx="4" fill="#f5f5f5"/>
    <rect x="148" y="62" width="80" height="10" rx="4" fill="#f5f5f5"/>
    <!-- badge -->
    <rect x="148" y="88" width="48" height="20" rx="6" fill="#fef3dc"/>
    <text x="172" y="102" font-family="Helvetica Neue, Arial" font-size="10" font-weight="700" fill="#d4880a" text-anchor="middle">EXW</text>
    <!-- video badge -->
    <rect x="204" y="88" width="60" height="20" rx="6" fill="#e9f7ee"/>
    <text x="234" y="102" font-family="Helvetica Neue, Arial" font-size="10" font-weight="700" fill="#1d8348" text-anchor="middle">▶ VIDEO</text>
    <!-- price -->
    <text x="148" y="140" font-family="-apple-system, Helvetica Neue, Arial" font-size="22" font-weight="700" fill="#1d1d1f" letter-spacing="-0.5">¥12,800</text>
    <!-- WA button -->
    <rect x="16" y="142" width="116" height="28" rx="14" fill="#e9f7ee" stroke="#b7e8c9" stroke-width="1"/>
    <text x="74" y="160" font-family="Helvetica Neue, Arial" font-size="11" font-weight="700" fill="#1d8348" text-anchor="middle">WhatsApp</text>

    <!-- Card 2 -->
    <rect y="200" width="380" height="180" rx="16" fill="#ffffff" stroke="#e8e8ed" stroke-width="1.5"/>
    <rect x="16" y="216" width="116" height="80" rx="10" fill="#f5f5f7"/>
    <rect x="148" y="224" width="180" height="12" rx="4" fill="#f0f0f0"/>
    <rect x="148" y="244" width="130" height="10" rx="4" fill="#f5f5f5"/>
    <rect x="148" y="262" width="90" height="10" rx="4" fill="#f5f5f5"/>
    <rect x="148" y="288" width="48" height="20" rx="6" fill="#fef3dc"/>
    <text x="172" y="302" font-family="Helvetica Neue, Arial" font-size="10" font-weight="700" fill="#d4880a" text-anchor="middle">EXW</text>
    <text x="148" y="340" font-family="-apple-system, Helvetica Neue, Arial" font-size="22" font-weight="700" fill="#1d1d1f" letter-spacing="-0.5">¥8,500</text>
    <rect x="16" y="342" width="116" height="28" rx="14" fill="#e9f7ee" stroke="#b7e8c9" stroke-width="1"/>
    <text x="74" y="360" font-family="Helvetica Neue, Arial" font-size="11" font-weight="700" fill="#1d8348" text-anchor="middle">WhatsApp</text>

    <!-- Card 3 — partially visible -->
    <rect y="400" width="380" height="100" rx="16" fill="#ffffff" stroke="#e8e8ed" stroke-width="1.5" opacity="0.6"/>
    <rect x="16" y="416" width="116" height="68" rx="10" fill="#f5f5f7" opacity="0.6"/>
    <rect x="148" y="424" width="160" height="12" rx="4" fill="#f0f0f0" opacity="0.6"/>
    <rect x="148" y="444" width="120" height="10" rx="4" fill="#f5f5f5" opacity="0.6"/>

    <!-- Stats pill -->
    <rect y="530" width="380" height="52" rx="14" fill="#1d1d1f"/>
    <text x="55" y="562" font-family="-apple-system, Helvetica Neue, Arial" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">2000+</text>
    <text x="55" y="576" font-family="Helvetica Neue, Arial" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">Units</text>
    <rect x="100" y="540" width="1" height="32" fill="rgba(255,255,255,0.15)"/>
    <text x="185" y="562" font-family="-apple-system, Helvetica Neue, Arial" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">50+</text>
    <text x="185" y="576" font-family="Helvetica Neue, Arial" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">Brands</text>
    <rect x="270" y="540" width="1" height="32" fill="rgba(255,255,255,0.15)"/>
    <text x="325" y="562" font-family="-apple-system, Helvetica Neue, Arial" font-size="16" font-weight="700" fill="#d4880a" text-anchor="middle">60+</text>
    <text x="325" y="576" font-family="Helvetica Neue, Arial" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">Countries</text>
  </g>
</svg>
