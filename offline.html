<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a1628">
  <meta name="robots" content="noindex">
  <title>AsiaPower Offline</title>
  <link rel="icon" href="/assets/favicon.png" type="image/png">
  <style>
    :root { color-scheme: light; font-family: Inter, Arial, sans-serif; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0a1628; color: #f5f7fb; }
    main { width: min(560px, calc(100% - 40px)); }
    img { width: 220px; max-width: 72%; height: auto; margin-bottom: 28px; }
    h1 { font-size: 30px; line-height: 1.12; margin: 0 0 12px; }
    p { color: #d7dee8; font-size: 16px; line-height: 1.65; margin: 0 0 24px; }
    a { color: #0a1628; background: #f3b340; display: inline-block; padding: 12px 18px; border-radius: 6px; text-decoration: none; font-weight: 700; }
  </style>
</head>
<body>
  <main>
    <img src="/assets/logo@2x.png" alt="AsiaPower">
    <h1>You are offline</h1>
    <p>AsiaPower is installed and ready. Reconnect to refresh live inventory, submit quote requests, or open WhatsApp enquiry links.</p>
    <a href="/">Return to Home</a>
  </main>
</body>
</html>
