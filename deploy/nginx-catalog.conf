# AsiaPower — catalog directory routing (nginx)
# Replace any rules that redirect /engines/ → /engines/ (self-loop).
# Include inside your server { } block; set root to the site document root.

# One-way canonical: index.html → trailing-slash directory URL
location = /engines/index.html { return 301 /engines/; }
location = /gearboxes/index.html { return 301 /gearboxes/; }
location = /chassis-parts/index.html { return 301 /chassis-parts/; }
location = /half-cuts/index.html { return 301 /half-cuts/; }

# Serve catalog hubs at clean URLs (no further redirect)
location = /engines/ { try_files /engines/index.html =404; }
location = /gearboxes/ { try_files /gearboxes/index.html =404; }
location = /chassis-parts/ { try_files /chassis-parts/index.html =404; }
location = /half-cuts/ { try_files /half-cuts/index.html =404; }

# Optional: bare path → trailing slash
location = /engines { return 301 /engines/; }
location = /gearboxes { return 301 /gearboxes/; }
location = /chassis-parts { return 301 /chassis-parts/; }
location = /half-cuts { return 301 /half-cuts/; }
