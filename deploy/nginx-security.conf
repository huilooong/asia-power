# AsiaPower — nginx security hardening (include inside server { } block)

# Block sensitive paths at the edge
location ^~ /data/ { return 404; }
location ^~ /server/ { return 404; }
location ^~ /deploy/ { return 404; }
location ^~ /scripts/ { return 404; }
location = /.env { return 404; }

# Internal pages — no indexing (defense in depth; pages also use noindex meta)
location ^~ /admin/ {
  add_header X-Robots-Tag "noindex, nofollow" always;
}

location = /supplier-portal/half-cut-upload.html {
  add_header X-Robots-Tag "noindex, nofollow" always;
}

# API rate limiting (requires limit_req_zone in http { } — see comment below)
# http { limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m; }
# location ^~ /api/ {
#   limit_req zone=api_limit burst=20 nodelay;
#   proxy_pass http://127.0.0.1:8080;
# }

add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
