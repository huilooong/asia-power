# 子敬 · 社媒互动频率策略（FB + X · 非洲市场）
# 目标：引流 asia-power.com — 买家需求优先，先发现真实需求，再人工批准互动
# KPI: asia-power.com + sales@asia-power.com
# CEO 2026-07-11：预算有限，停止平台极限探测；只保留能找到精准客户和询盘的动作

version: 5
updated: "2026-07-11"
stop_condition: demand_first_human_approval

# CEO 路由（Mac cron / launchd 入口 scripts/apsales-zijing-run.py）
operating_modes:
  limited_mode: demand_drafts    # 只处理已有社媒情报 → 草稿队列
  normal_mode: demand_discovery  # 浏览/发现公开需求 → 社媒需求草稿 → CEO 批准后互动
  limits_file: memory/customer_gateway/fb_platform_limits.json
  unified_entry: scripts/apsales-zijing-run.py
  activity_log_action: social_demand_drafts

mission_today:
  focus: "发现 engine / gearbox / half-cut 买家需求，生成回复草稿，引导到 asia-power.com，不做泛群发"
  skip_platforms:
    - instagram  # INS 今日暂停

engagement_priority:
  P0: "浏览公开/已加入社媒信息流，识别真实买家求购帖"
  P1: "为高意图求购帖生成 APSales 回复草稿"
  P2: "CEO/APSales 批准后再回复，导流到对应国家/产品页面"
  P3: "时间线发帖 · 0/日 · 仅 CEO 明确要求时"
  P4: "好友 DM 默认关闭，只有明确买家互动后人工批准"
  P5: "X 低优先级，仅保留监听/草稿"

platforms:
  facebook:
    enabled: true
    max_posts_per_day: 0              # 时间线停用 — platform-limited only
    max_timeline_posts_per_day: 0
    max_group_joins_per_day: 3
    max_group_greetings_per_day: 0
    max_group_comments_per_day: 3
    max_comments_per_hour: 2
    max_follows_per_day: 0
    max_dms_per_day: 0
    max_dms_per_run: 0
    join_batch_size: 3
    min_interval_seconds: 90
    max_interval_seconds: 240
    min_interval_minutes: null        # deprecated — use seconds in probe mode
    max_interval_minutes: null        # removed — no long gaps within session
  x:
    enabled: true
    max_posts_per_day: 0
    max_comments_per_hour: 1
    max_follows_per_day: 0
    max_dms_per_day: 0
    min_interval_seconds: 120
    max_interval_seconds: 300
  instagram:
    enabled: false
    reason: "paused_today_ins_broken"

# 检测到限流 → 写入 fb_platform_limits.json，仅暂停该动作类型 24h
rate_limit:
  detect_patterns:
    - "temporarily blocked"
    - "action blocked"
    - "try again later"
    - "can't post"
    - "restricted"
    - "unusual activity"
    - "暂时无法"
    - "操作受限"
  auto_disable_timeline_posts_hours: 24
  pause_action_hours: 24

facebook_groups:
  enabled: true
  max_searches_per_day: 5
  max_joins_per_day: 3
  max_greetings_per_day: 0
  max_comments_per_day: 3
  join_batch_size: 3
  greeting_template: |
    Hi — if you are checking engines, gearboxes or half-cuts, please match engine code, gearbox type and donor photos before payment. AsiaPower can help confirm options from China after model/year/port are known.
  mac_script: scripts/apsales-facebook-daily-run.py
  alternate_mac_script: scripts/apsales-social-alternate-run.py
  unified_mac_script: scripts/apsales-zijing-run.py
  note: "Mac 本地 gooddlong 已登录 · 限流→Maps · 正常→FB↔X · launchd 每 45 分钟"

scheduling:
  rule: "any_market_awake"
  alternate_platforms: false
  cron_interval_minutes: 45
  actions_per_run: 1
  aggressive_session_max_hours: 0
  aggressive_rest_hours: 0
  continuous_session: false
  night_slow_mode:
    enabled: false                    # 探测模式：夜间也不自我限流
    note: "platform_block_only — 全球市场均休眠时仍全速探测"

market_timezones:
  west_africa:
    label: "西非"
    display: "加纳"
    flag: "🇬🇭"
    timezone: "Africa/Accra"
    countries: [Ghana, Nigeria, "Côte d'Ivoire", Senegal]
    active_local:
      start: "08:00"
      end: "21:00"
  east_africa:
    label: "东非"
    display: "肯尼亚"
    flag: "🇰🇪"
    timezone: "Africa/Nairobi"
    countries: [Kenya, Tanzania, Uganda]
    active_local:
      start: "08:00"
      end: "21:00"
  gulf:
    label: "海湾"
    display: "阿联酋"
    flag: "🇦🇪"
    timezone: "Asia/Dubai"
    countries: [UAE, Saudi, Qatar, Kuwait, Bahrain, Oman]
    active_local:
      start: "09:00"
      end: "21:00"

active_hours_utc:
  start: "08:00"
  end: "20:00"
  timezone_note: "deprecated — use market_timezones"

approval:
  auto_run:
    - browse_feed
    - demand_draft
  needs_ceo_approval:
    - new_post_type
    - scheme_post
    - templated_comment
    - reply_to_inbox
    - group_greeting
    - group_join
    - group_comment
    - friend_one_to_one_dm
  ceo_approved:
    - none_by_default

follow_keywords:
  hashtags:
    - Tokunbo
    - HalfCut
    - AutoParts
    - UsedCars
    - SpareParts
    - JDMparts
    - HalfCutJapan
  markets:
    - Ghana
    - Nigeria
    - Kenya
    - Tanzania
    - Uganda
    - SouthAfrica
    - CotedIvoire
    - Senegal
  search_phrases:
    - "tokunbo spare parts Ghana"
    - "Nigeria auto parts importer"
    - "Kenya half cut Toyota"
    - "Mombasa used car parts"
    - "Lagos tokunbo dealer"
    - "Accra spare parts shop"
    - "half cut engine Nigeria"
    - "Toyota spare parts Ghana"
    - "auto parts Kenya"
    - "tokunbo half cut Lagos"
    - "spare parts Accra Ghana"
    - "used car parts Nairobi"

comment_templates:
  helpful_no_link:
    - "Good tip — always match engine code + photos before you buy a half-cut. Verified photos on the supplier listing save headaches at port."
    - "For rebuild shops in West Africa, 2NZ-FE and HR16DE are steady movers — check gearbox code matches the donor car."
    - "Tokunbo importers: compression + ECU harness check before payment — photos on the listing help a lot."
  helpful_with_link_when_relevant:
    - "We list verified half-cuts with real photos on our site — browse first, no pressure in DMs: https://asia-power.com/half-cuts/"
    - "Need options with photos? Email sales@asia-power.com after you browse: https://asia-power.com/half-cuts/"
    - "Custom dismantling on demand — model + engine code, we match supplier stock with photos: https://asia-power.com/half-cuts/"

reply_templates:
  after_they_engaged:
    - "Thanks! More photos on the listing: {listing_url} — email sales@asia-power.com with your model/engine code for a quote."
    - "Appreciate it. Browse verified photos here: {listing_url} then email sales@asia-power.com for options."

scheme_content_ref: "data/knowledge-base/apsales-promotion-schemes-v2.md"

browse_feed:
  enabled: true
  platform: facebook
  sessions_per_day: 3
  session_minutes: 10
  note: "Mac 本地浏览公开/已加入信息流；只保存情报，不自动评论"
  focus_keywords:
    - dismantling
    - half cut
    - tokunbo
    - spare parts
    - engine
    - gearbox
  notes_file: memory/customer_gateway/social_research_notes.jsonl
  optional_comment: false
  mac_script: scripts/apsales-facebook-browse-friends.py

friend_dm:
  enabled: false
  max_per_run: 0
  max_per_day: 0
  delay_seconds_min: 30
  delay_seconds_max: 90
  note: "默认关闭；只有明确买家互动且 CEO 批准后才手动/受控发送"
  log_file: memory/customer_gateway/fb_friend_dm_log.jsonl
  mac_script: scripts/apsales-facebook-dm-friends.py
  stop_on_captcha: true

outreach_copy:
  file: config/apsales_outreach_copy.yaml
  version: human_v2
  note: "CEO 可编辑话术 · 链接间隔 120 秒 · 每对话最多 2 链接 · DM/小组/X/评论"
