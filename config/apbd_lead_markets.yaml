# APBD Lead Finder · 统一市场查询（Maps Places）
# 2026-07-15：合并 lead_finder PHASE1 + apsales_maps_prospect.yaml，查询去重。
# 目标：同一套市场只跑一遍，减少免费 Demo Key 的 Places 调用次数。
# CEO 约束：不升级付费 Key；撞额度只记录，不在此开账单。

version: 2
updated: "2026-07-15"
canonical_for: lead_finder
deprecated_parallel_path: "customer_gateway/maps_prospect.py run_maps_prospect_batch（已停用独立跑批）"

search:
  max_results_per_query: 5
  # 单次发现上限（原硬编码 30）；略降以拉长免费额度可用天数
  max_queries_per_run: 20
  max_total_leads: 40

